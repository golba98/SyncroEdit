<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynchroBot Eye Tracking Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a0033;
      font-family: Arial, sans-serif;
      color: white;
    }
    
    .container {
      display: flex;
      gap: 50px;
      align-items: center;
      min-height: 100vh;
    }
    
    .form-section {
      flex: 1;
      max-width: 400px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #a78bfa;
    }
    
    input {
      width: 100%;
      padding: 12px;
      background: #0d0d0d;
      border: 1px solid #8b5cf6;
      border-radius: 8px;
      color: white;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }
    
    .character-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .bot-rig {
      position: relative;
    }
    
    .head {
      width: 200px;
      height: 200px;
      background: #2a2a2a;
      border-radius: 30px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .face-screen {
      width: 180px;
      height: 180px;
      background: #000;
      border-radius: 20px;
      position: relative;
    }
    
    .eyes-container {
      display: flex;
      justify-content: center;
      gap: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .eye {
      width: 40px;
      height: 50px;
      background: #111;
      border-radius: 15px;
      position: relative;
      overflow: hidden;
    }
    
    .pupil {
      width: 20px;
      height: 20px;
      background: #8b5cf6;
      border-radius: 5px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #8b5cf6;
      transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    .info {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 300px;
    }
    
    .status {
      color: #00ff88;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="info">
    <div class="status" id="status">Status: Testing Eye Tracking</div>
    <div id="coords">Target: -</div>
    <div id="eyePos">Eye Center: -</div>
    <div id="delta">Delta: -</div>
    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #444;">
      <strong>Test Instructions:</strong><br>
      1. Focus the username input (left side)<br>
      2. Eyes should look LEFT<br>
      3. Focus password - eyes should center<br>
      4. Move mouse around - eyes should follow
    </div>
  </div>

  <div class="container">
    <div class="form-section">
      <h2 style="color: #8b5cf6;">Login Form</h2>
      <div class="input-group">
        <label for="username">Username or Email</label>
        <input type="text" id="loginUsername" placeholder="Enter username">
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password">
      </div>
    </div>

    <div class="character-container">
      <div class="bot-rig" id="botRig">
        <div class="head">
          <div class="face-screen">
            <div class="eyes-container">
              <div class="eye left">
                <div class="pupil"></div>
              </div>
              <div class="eye right">
                <div class="pupil"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { SynchroBot } from '../js/features/auth/synchro/SynchroBot.js';

    const synchro = new SynchroBot({ authFlow: 'login' });
    synchro.init('.character-container');

    // Add debug info
    const statusEl = document.getElementById('status');
    const coordsEl = document.getElementById('coords');
    const eyePosEl = document.getElementById('eyePos');
    const deltaEl = document.getElementById('delta');

    // Override updateEyePosition to add debug info
    const originalUpdate = synchro.updateEyePosition.bind(synchro);
    synchro.updateEyePosition = function(target) {
      const eye = document.querySelector('.eye');
      if (eye) {
        const eyeRect = eye.getBoundingClientRect();
        const eyeCenterX = eyeRect.left + eyeRect.width / 2;
        const eyeCenterY = eyeRect.top + eyeRect.height / 2;
        const deltaX = target.x - eyeCenterX;
        const deltaY = target.y - eyeCenterY;
        
        coordsEl.textContent = `Target: (${Math.round(target.x)}, ${Math.round(target.y)})`;
        eyePosEl.textContent = `Eye Center: (${Math.round(eyeCenterX)}, ${Math.round(eyeCenterY)})`;
        deltaEl.textContent = `Delta: (${Math.round(deltaX)}, ${Math.round(deltaY)}) ${deltaX < 0 ? '← LEFT' : '→ RIGHT'}`;
      }
      originalUpdate(target);
    };

    // Setup input listeners
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', (e) => {
        const fieldName = e.target.id.includes('Password') ? 'password' : 'username';
        statusEl.textContent = `Status: Focused ${fieldName}`;
        synchro.onFieldFocus(fieldName, e.target.value);
      });

      input.addEventListener('blur', () => {
        statusEl.textContent = 'Status: Idle';
        synchro.onFieldBlur();
      });
    });

    console.log('SynchroBot test initialized');
  </script>
</body>
</html>
