<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SyncroEdit Logo Redesign</title>
    <style>
      :root {
        color: #17151f;
        background: #f7f7fa;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 22% 0%, rgba(128, 94, 255, 0.13), transparent 30rem),
          linear-gradient(180deg, #fbfbfd 0%, #f3f2f8 100%);
      }

      main {
        width: min(1180px, calc(100% - 40px));
        margin: 0 auto;
        padding: 56px 0 72px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 4.5rem);
        font-weight: 720;
        letter-spacing: 0;
        line-height: 0.98;
        max-width: 760px;
      }

      h2 {
        font-size: 1.05rem;
        font-weight: 680;
      }

      p {
        color: #625c70;
        line-height: 1.6;
        max-width: 660px;
      }

      .intro {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 220px;
        gap: 40px;
        align-items: center;
        min-height: 360px;
      }

      .intro-copy {
        display: grid;
        gap: 18px;
      }

      .hero-icon {
        width: 220px;
        height: 220px;
        filter: drop-shadow(0 30px 44px rgba(43, 16, 94, 0.24));
      }

      .section {
        margin-top: 48px;
        display: grid;
        gap: 18px;
      }

      .panel {
        border: 1px solid rgba(46, 36, 81, 0.1);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 70px rgba(34, 26, 62, 0.08);
        overflow: hidden;
      }

      .showcase {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stage {
        min-height: 360px;
        display: grid;
        place-items: center;
        padding: 44px;
      }

      .stage.light {
        background: #fbfbfd;
      }

      .stage.dark {
        background:
          radial-gradient(circle at 50% 15%, rgba(128, 94, 255, 0.18), transparent 22rem), #111017;
      }

      .stage img {
        width: min(48vw, 212px);
        max-width: 100%;
        filter: drop-shadow(0 28px 42px rgba(38, 16, 82, 0.28));
      }

      .variant-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        background: rgba(46, 36, 81, 0.1);
      }

      .variant {
        min-height: 260px;
        display: grid;
        place-items: center;
        background: #fff;
        padding: 34px;
      }

      .variant img {
        width: min(100%, 144px);
        filter: drop-shadow(0 22px 32px rgba(42, 16, 94, 0.22));
      }

      .transparent-stage {
        min-height: 360px;
        display: grid;
        place-items: center;
        padding: 46px;
        background-color: #f8f8fb;
        background-image:
          linear-gradient(45deg, #e4e2ea 25%, transparent 25%),
          linear-gradient(-45deg, #e4e2ea 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #e4e2ea 75%),
          linear-gradient(-45deg, transparent 75%, #e4e2ea 75%);
        background-position:
          0 0,
          0 12px,
          12px -12px,
          -12px 0;
        background-size: 24px 24px;
      }

      .transparent-stage img {
        width: 190px;
        filter: drop-shadow(0 24px 36px rgba(42, 16, 94, 0.22));
      }

      .mockup {
        min-height: 430px;
        display: grid;
        place-items: center;
        padding: 46px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(229, 229, 239, 0.86)), #eef0f6;
      }

      .dock {
        width: min(620px, 100%);
        min-height: 220px;
        border-radius: 32px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.56);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.88),
          0 30px 90px rgba(61, 55, 78, 0.18);
        backdrop-filter: blur(22px);
      }

      .dock img {
        width: 152px;
        height: 152px;
        filter: drop-shadow(0 18px 28px rgba(35, 18, 76, 0.32));
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 28px, 1180px);
          padding-top: 34px;
        }

        .intro {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .hero-icon {
          width: 156px;
          height: 156px;
        }

        .showcase,
        .variant-grid {
          grid-template-columns: 1fr;
        }

        .stage,
        .transparent-stage,
        .mockup {
          min-height: 280px;
          padding: 30px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <div class="intro-copy">
          <h1>SyncroEdit Premium Icon System</h1>
          <p>
            A refined Apple-inspired evolution of the existing rounded-square document mark,
            preserving the purple identity while improving geometry, depth, spacing, and small-size
            clarity.
          </p>
        </div>
        <img
          class="hero-icon"
          src="../archive/brand/syncroedit-icon-premium.svg"
          alt="Primary SyncroEdit premium icon"
        />
      </section>

      <section class="section">
        <h2>Primary Logo</h2>
        <div class="panel showcase">
          <div class="stage light">
            <img
              src="../archive/brand/syncroedit-icon-premium.svg"
              alt="Primary logo on light background"
            />
          </div>
          <div class="stage dark">
            <img
              src="../archive/brand/syncroedit-icon-premium.svg"
              alt="Primary logo on dark background"
            />
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Subtle Variations</h2>
        <div class="panel variant-grid">
          <div class="variant">
            <img src="../archive/brand/syncroedit-icon-premium.svg" alt="Primary refined logo" />
          </div>
          <div class="variant">
            <img src="../archive/brand/syncroedit-icon-variant-1.svg" alt="Logo variation one" />
          </div>
          <div class="variant">
            <img src="../archive/brand/syncroedit-icon-variant-2.svg" alt="Logo variation two" />
          </div>
          <div class="variant">
            <img src="../archive/brand/syncroedit-icon-variant-3.svg" alt="Logo variation three" />
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Transparent Background</h2>
        <div class="panel transparent-stage">
          <img
            src="../archive/brand/syncroedit-icon-premium-transparent.svg"
            alt="Transparent background logo preview"
          />
        </div>
      </section>

      <section class="section">
        <h2>App Icon Mockup</h2>
        <div class="panel mockup">
          <div class="dock">
            <img src="../archive/brand/syncroedit-icon-premium.svg" alt="App icon mockup" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
