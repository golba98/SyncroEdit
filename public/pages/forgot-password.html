<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynchroEdit - Forgot Password</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="../css/synchro.css" />
    <style>
      :root {
        --accent-color: #8b5cf6;
        --accent-glow: rgba(139, 92, 246, 0.6);
        --bg-gradient: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg-gradient);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        transition: background 0.5s;
      }

      body.error-flash {
        background: linear-gradient(135deg, #330000 0%, #1a0000 50%, #000000 100%);
      }

      .login-container {
        background: #0d0d0d;
        border-radius: 60px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 80px var(--accent-glow);
        border: 1px solid #2a2a2a;
        display: flex;
        width: 100%;
        max-width: 900px;
        margin: 20px;
        min-height: 500px;
        position: relative;
        z-index: 10;
        transition: box-shadow 0.5s;
        overflow: hidden;
      }

      .left-section {
        flex: 1;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: #000000;
        z-index: 2;
        position: relative;
      }

      .right-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000000 70%);
        position: relative;
        overflow: hidden;
      }

      .character-container {
        position: relative;
        width: 300px;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .title {
        font-size: 28px;
        font-weight: bold;
        color: var(--accent-color);
        margin-bottom: 10px;
        text-shadow: 0 0 20px var(--accent-glow);
      }

      .subtitle {
        font-size: 14px;
        color: #b0b0b0;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 25px;
        text-align: left;
      }

      .input-group label {
        display: block;
        font-size: 12px;
        color: #e0e0e0;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .input-group input {
        width: 100%;
        padding: 15px;
        font-size: 14px;
        border: 1px solid #2a2a2a;
        background: #1a1a1a;
        border-radius: 8px;
        outline: none;
        transition: all 0.3s;
        color: #e0e0e0;
      }

      .input-group input:focus {
        background: #0d0d0d;
        border-color: var(--accent-color);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
      }

      .action-btn {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: var(--accent-color);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
        box-shadow: 0 0 25px var(--accent-glow);
        position: relative;
        overflow: hidden;
      }

      .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 35px var(--accent-glow);
      }

      .status-message {
        margin-top: 20px;
        font-size: 14px;
        min-height: 20px;
        text-align: center;
      }

      .status-message.success {
        color: #4caf50;
      }

      .status-message.error {
        color: #f44336;
      }

      .back-link {
        margin-top: 25px;
        font-size: 14px;
        color: #b0b0b0;
        text-align: center;
      }

      .back-link a {
        color: var(--accent-color);
        text-decoration: none;
        cursor: pointer;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      /* =========================================
         MOBILE RESPONSIVE ADJUSTMENTS
         ========================================= */
      @media (max-width: 768px) {
        body {
          align-items: flex-start;
          padding: 20px 0;
          overflow-y: auto;
          min-height: 100dvh;
        }

        .login-container {
          flex-direction: column-reverse;
          width: 90% !important;
          max-width: 400px;
          min-height: auto;
          border-radius: 24px;
          margin: 0 auto;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .left-section {
          padding: 30px 24px;
          background: #000000;
          border-radius: 0 0 24px 24px;
        }

        .right-section {
          height: 120px;
          background: radial-gradient(circle at center, #1a1a1a 0%, #000000 80%);
          border-radius: 24px 24px 0 0;
          border-bottom: 1px solid #1a1a1a;
        }

        .character-container {
          width: 100%;
          height: 100%;
          transform: scale(0.4);
          transform-origin: center bottom;
          margin-bottom: -15px;
        }

        .title {
          font-size: 24px;
          text-align: center;
        }

        .subtitle {
          text-align: center;
          font-size: 13px;
          margin-bottom: 20px;
        }

        /* Touch-friendly inputs */
        .input-group input {
          padding: 14px;
          font-size: 16px; /* Prevent iOS zoom */
          min-height: 48px;
        }

        .action-btn {
          padding: 16px;
          min-height: 48px;
          font-size: 16px;
        }
      }

      /* Touch-friendly hover states */
      @media (hover: none) {
        .action-btn:active {
          transform: scale(0.98);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="left-section">
        <div class="title">Reset Password</div>
        <div class="subtitle">Enter your email to receive a reset link</div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your registered email"
            autocomplete="email"
          />
        </div>

        <button class="action-btn" id="sendBtn">Send Reset Link</button>
        <div class="status-message" id="statusMessage"></div>

        <div class="back-link">
          <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
      </div>

      <div class="right-section">
        <div class="character-container">
          <div class="bot-rig" id="botRig">
            <div class="antenna-stalk"></div>
            <div class="antenna-bulb"></div>
            <div class="head">
              <div class="face-screen">
                <div class="loader"></div>
                <div class="eyes-container">
                  <div class="eye left">
                    <div class="eyelid top"></div>
                    <div class="pupil"></div>
                    <div class="eyelid bottom"></div>
                  </div>
                  <div class="eye right">
                    <div class="eyelid top"></div>
                    <div class="pupil"></div>
                    <div class="eyelid bottom"></div>
                  </div>
                </div>
                <div class="mouth"></div>
              </div>
            </div>
            <div class="hands-container">
              <div class="hand left"></div>
              <div class="hand right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/config.js"></script>
    <script type="module">
      import { Network } from '../js/app/network.js';
      import { SynchroBot } from '../js/features/auth/synchro/SynchroBot.js';
      import { SynchroRenderer } from '../js/features/auth/synchro/SynchroRenderer.js';

      // Initialize SynchroBot with empathy flow
      const container = document.querySelector('.character-container');
      let synchro = null;
      let renderer = null;

      if (container) {
        synchro = new SynchroBot({ authFlow: 'forgot' });
        synchro.init('.character-container');

        renderer = new SynchroRenderer(container);
        renderer.injectParticleCSS();
      }

      const emailInput = document.getElementById('email');
      const sendBtn = document.getElementById('sendBtn');
      const statusMessage = document.getElementById('statusMessage');

      // Wire up SynchroBot events
      emailInput?.addEventListener('focus', () => {
        synchro?.onFieldFocus('email', emailInput.value);
      });

      emailInput?.addEventListener('input', () => {
        synchro?.onFieldInput('email', emailInput.value, {
          formData: { email: emailInput.value, _hasErrors: !emailInput.value.includes('@') },
        });
      });

      emailInput?.addEventListener('blur', () => {
        synchro?.onFieldBlur();
      });

      sendBtn?.addEventListener('mouseenter', () => {
        synchro?.onButtonHover(true);
      });

      sendBtn?.addEventListener('mouseleave', () => {
        synchro?.onButtonHover(false);
      });

      async function handleForgot() {
        const email = emailInput.value.trim();
        if (!email) {
          statusMessage.textContent = 'Please enter your email.';
          statusMessage.className = 'status-message error';
          synchro?.onError();
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          statusMessage.textContent = 'Please enter a valid email address.';
          statusMessage.className = 'status-message error';
          synchro?.onError();
          setTimeout(() => synchro?.applyState('empathy'), 2000);
          return;
        }

        synchro?.onSubmit();
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        statusMessage.textContent = '';

        try {
          const data = await Network.fetchAPI('/api/auth/forgot-password', {
            method: 'POST',
            body: JSON.stringify({ email }),
          });

          synchro?.onSuccess();
          renderer?.burst('star', 3);
          statusMessage.textContent = '✓ ' + data.message;
          statusMessage.className = 'status-message success';
          emailInput.value = '';
        } catch (err) {
          synchro?.onError();
          statusMessage.textContent =
            '✗ ' + (err.message.replace('API error: ', 'Error ') || 'Failed to send request.');
          statusMessage.className = 'status-message error';
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Reset Link';
        }
      }

      sendBtn.addEventListener('click', handleForgot);
      emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleForgot();
      });
    </script>
  </body>
</html>
