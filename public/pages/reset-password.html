<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynchroEdit - Set New Password</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="../css/synchro.css" />
    <style>
      :root {
        --accent-color: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.2);
        --bg-gradient: linear-gradient(135deg, #101418 0%, #0f1317 50%, #0c0e11 100%);
        --radius-lg: 12px;
        --radius-sm: 6px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: var(--bg-gradient);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        transition: background 0.5s;
      }

      body.error-flash {
        background: linear-gradient(135deg, #2a1010 0%, #1a0808 50%, #000000 100%);
      }

      .login-container {
        background: #151a20;
        border-radius: var(--radius-lg);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
        border: 1px solid #2a323d;
        display: flex;
        width: 100%;
        max-width: 900px;
        margin: 20px;
        min-height: 500px;
        position: relative;
        z-index: 10;
        transition: box-shadow 0.5s;
        overflow: hidden;
      }

      .left-section {
        flex: 1;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: #101418;
        z-index: 2;
        position: relative;
      }

      .right-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #151a20 0%, #0f1317 70%);
        position: relative;
        overflow: hidden;
      }

      .character-container {
        position: relative;
        width: 300px;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .title {
        font-size: 28px;
        font-weight: bold;
        color: #f3f4f6;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 14px;
        color: #b0b7c3;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 20px;
        text-align: left;
        position: relative;
      }

      .input-group label {
        display: block;
        font-size: 12px;
        color: #f3f4f6;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .input-group input {
        width: 100%;
        padding: 15px;
        font-size: 14px;
        border: 1px solid #2a323d;
        background: #1a2028;
        border-radius: var(--radius-sm);
        outline: none;
        transition: all 0.2s;
        color: #f3f4f6;
      }

      .input-group input:focus {
        background: #151a20;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
      }

      .action-btn {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: var(--accent-color);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
        position: relative;
        overflow: hidden;
      }

      .action-btn:hover {
        transform: translateY(-1px);
        background: #2563eb;
      }

      .status-message {
        margin-top: 20px;
        font-size: 14px;
        min-height: 20px;
        text-align: center;
      }

      .status-message.success {
        color: #4caf50;
      }

      .status-message.error {
        color: #f44336;
      }

      .back-link {
        margin-top: 25px;
        font-size: 14px;
        color: #b0b0b0;
        text-align: center;
      }

      .back-link a {
        color: var(--accent-color);
        text-decoration: none;
        cursor: pointer;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      /* =========================================
         MOBILE RESPONSIVE ADJUSTMENTS
         ========================================= */
      @media (max-width: 768px) {
        body {
          align-items: flex-start;
          padding: 20px 0;
          overflow-y: auto;
          min-height: 100dvh;
        }

        .login-container {
          flex-direction: column-reverse;
          width: 90% !important;
          max-width: 400px;
          min-height: auto;
          border-radius: 24px;
          margin: 0 auto;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .left-section {
          padding: 30px 24px;
          background: #000000;
          border-radius: 0 0 24px 24px;
        }

        .right-section {
          height: 120px;
          background: radial-gradient(circle at center, #1a1a1a 0%, #000000 80%);
          border-radius: 24px 24px 0 0;
          border-bottom: 1px solid #1a1a1a;
        }

        .character-container {
          width: 100%;
          height: 100%;
          transform: scale(0.4);
          transform-origin: center bottom;
          margin-bottom: -15px;
        }

        .title {
          font-size: 24px;
          text-align: center;
        }

        .subtitle {
          text-align: center;
          font-size: 13px;
          margin-bottom: 20px;
        }

        /* Touch-friendly inputs */
        .input-group input {
          padding: 14px;
          font-size: 16px; /* Prevent iOS zoom */
          min-height: 48px;
        }

        .action-btn {
          padding: 16px;
          min-height: 48px;
          font-size: 16px;
        }
      }

      /* Touch-friendly hover states */
      @media (hover: none) {
        .action-btn:active {
          transform: scale(0.98);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="left-section">
        <div class="title">New Password</div>
        <div class="subtitle">Secure your account with a strong password</div>

        <div class="input-group">
          <label for="usernameConfirm">Confirm Username</label>
          <input
            type="text"
            id="usernameConfirm"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>

        <div class="input-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            placeholder="Minimum 8 chars, numbers & symbols"
            autocomplete="new-password"
          />
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Repeat password"
            autocomplete="new-password"
          />
        </div>

        <div class="input-group" id="mfaGroup" style="display: none">
          <label for="mfaCode">2FA Code</label>
          <input type="text" id="mfaCode" placeholder="Enter 6-digit code" maxlength="6" />
        </div>

        <button class="action-btn" id="resetBtn">Set New Password</button>
        <div class="status-message" id="statusMessage"></div>

        <div class="back-link">
          <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
      </div>

      <div class="right-section">
        <div class="character-container">
          <div class="bot-rig" id="botRig">
            <div class="antenna-stalk"></div>
            <div class="antenna-bulb"></div>
            <div class="head">
              <div class="face-screen">
                <div class="loader"></div>
                <div class="eyes-container">
                  <div class="eye left">
                    <div class="eyelid top"></div>
                    <div class="pupil"></div>
                    <div class="eyelid bottom"></div>
                  </div>
                  <div class="eye right">
                    <div class="eyelid top"></div>
                    <div class="pupil"></div>
                    <div class="eyelid bottom"></div>
                  </div>
                </div>
                <div class="mouth"></div>
              </div>
            </div>
            <div class="hands-container">
              <div class="hand left"></div>
              <div class="hand right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/config.js"></script>
    <script type="module">
      import { Network } from '../js/app/network.js';
      import { Auth } from '../js/features/auth/auth.js';
      import { PASSWORD_REGEX } from '../js/app/utils.js';
      import { SynchroBot } from '../js/features/auth/synchro/SynchroBot.js';
      import { SynchroRenderer } from '../js/features/auth/synchro/SynchroRenderer.js';

      // Initialize SynchroBot with reset flow
      const container = document.querySelector('.character-container');
      let synchro = null;
      let renderer = null;

      if (container) {
        synchro = new SynchroBot({ authFlow: 'reset' });
        synchro.init('.character-container');

        renderer = new SynchroRenderer(container);
        renderer.injectParticleCSS();
      }

      const usernameInput = document.getElementById('usernameConfirm');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirmPassword');
      const mfaInput = document.getElementById('mfaCode');
      const mfaGroup = document.getElementById('mfaGroup');
      const resetBtn = document.getElementById('resetBtn');
      const statusMessage = document.getElementById('statusMessage');

      const token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
        statusMessage.textContent = '✗ Invalid or missing reset token.';
        statusMessage.className = 'status-message error';
        resetBtn.disabled = true;
        document.querySelector('.subtitle').textContent = 'Please request a new link.';
        synchro?.onError();
      }

      // Wire up SynchroBot events for username field
      usernameInput?.addEventListener('focus', () => {
        synchro?.onFieldFocus('username', usernameInput.value);
      });

      usernameInput?.addEventListener('input', () => {
        synchro?.onFieldInput('username', usernameInput.value, {
          formData: {
            username: usernameInput.value,
            password: passwordInput.value,
            confirmPassword: confirmInput.value,
          },
        });
      });

      usernameInput?.addEventListener('blur', () => {
        synchro?.onFieldBlur();
      });

      // Wire up SynchroBot events for password field
      passwordInput?.addEventListener('focus', () => {
        synchro?.onFieldFocus('password', passwordInput.value);
      });

      passwordInput?.addEventListener('input', () => {
        const isStrong = PASSWORD_REGEX.test(passwordInput.value);
        synchro?.onFieldInput('password', passwordInput.value, {
          formData: {
            username: usernameInput.value,
            password: passwordInput.value,
            confirmPassword: confirmInput.value,
            _hasErrors: !isStrong && passwordInput.value.length > 0,
          },
        });
      });

      passwordInput?.addEventListener('blur', () => {
        synchro?.onFieldBlur();
      });

      // Wire up SynchroBot events for confirm password field
      confirmInput?.addEventListener('focus', () => {
        synchro?.onFieldFocus('confirmPassword', confirmInput.value);
      });

      confirmInput?.addEventListener('input', () => {
        const passwordsMatch = passwordInput.value === confirmInput.value;
        synchro?.onFieldInput('confirmPassword', confirmInput.value, {
          formData: {
            username: usernameInput.value,
            password: passwordInput.value,
            confirmPassword: confirmInput.value,
            _hasErrors: !passwordsMatch && confirmInput.value.length > 0,
          },
        });
      });

      confirmInput?.addEventListener('blur', () => {
        synchro?.onFieldBlur();
      });

      // Button hover events
      resetBtn?.addEventListener('mouseenter', () => {
        synchro?.onButtonHover(true);
      });

      resetBtn?.addEventListener('mouseleave', () => {
        synchro?.onButtonHover(false);
      });

      async function handleReset() {
        const username = usernameInput.value;
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        const mfaCode = mfaInput.value;

        if (!username || !password || !confirm) {
          statusMessage.textContent = 'Please fill in all fields.';
          statusMessage.className = 'status-message error';
          synchro?.onError();
          return;
        }

        if (password !== confirm) {
          statusMessage.textContent = '✗ Passwords do not match.';
          statusMessage.className = 'status-message error';
          synchro?.onError();
          return;
        }

        // Client-side pre-validation
        if (!PASSWORD_REGEX.test(password)) {
          statusMessage.textContent =
            '✗ Password too weak (Min 8 chars, Upper, Lower, Number, Symbol).';
          statusMessage.className = 'status-message error';
          synchro?.onError();
          return;
        }

        synchro?.onSubmit();
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        statusMessage.textContent = '';

        try {
          const data = await Network.fetchAPI('/api/auth/reset-password', {
            method: 'POST',
            body: JSON.stringify({ token, password, username, mfaCode }),
          });

          synchro?.onSuccess();
          renderer?.burst('star', 5);
          statusMessage.textContent = '✓ Password reset! Redirecting to login...';
          statusMessage.className = 'status-message success';

          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } catch (err) {
          synchro?.onError();
          if (err.data && err.data.mfaRequired) {
            mfaGroup.style.display = 'block';
            statusMessage.textContent = '✗ 2FA code required for this account.';
          } else {
            statusMessage.textContent =
              '✗ ' + (err.message.replace('API error: ', 'Error ') || 'Reset failed.');
          }
          statusMessage.className = 'status-message error';
          resetBtn.disabled = false;
          resetBtn.textContent = 'Set New Password';
        }
      }

      resetBtn.addEventListener('click', handleReset);
      passwordInput?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') confirmInput?.focus();
      });
      confirmInput?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleReset();
      });
    </script>
  </body>
</html>
