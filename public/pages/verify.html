<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email - SynchroEdit</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="../css/synchro.css" />
    <style>
      :root {
        --accent-color: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.2);
        --bg-gradient: linear-gradient(135deg, #101418 0%, #0f1317 50%, #0c0e11 100%);
        --radius-lg: 12px;
        --radius-sm: 6px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: var(--bg-gradient);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        transition: background 0.5s;
      }

      body.error-flash {
        background: linear-gradient(135deg, #2a1010 0%, #1a0808 50%, #000000 100%);
      }

      .login-container {
        background: #151a20;
        border-radius: var(--radius-lg);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
        border: 1px solid #2a323d;
        display: flex;
        width: 100%;
        max-width: 900px;
        margin: 20px;
        min-height: 500px;
        position: relative;
        z-index: 10;
        transition: box-shadow 0.5s;
        overflow: hidden;
      }

      .left-section {
        flex: 1;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: #101418;
        z-index: 2;
        position: relative;
      }

      .right-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #151a20 0%, #0f1317 70%);
        position: relative;
        overflow: hidden;
      }

      .character-container {
        position: relative;
        width: 300px;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .heading {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 28px;
        font-weight: 700;
        color: #f3f4f6;
        margin-bottom: 12px;
      }

      .muted {
        color: #b0b7c3;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 18px;
      }

      .email-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: var(--radius-sm);
        color: #f3f4f6;
        font-weight: 600;
        margin-bottom: 20px;
      }

      .field-label {
        font-size: 13px;
        color: #b0b7c3;
        margin-bottom: 6px;
        display: block;
      }

      .code-input {
        width: 100%;
        padding: 14px;
        border-radius: var(--radius-sm);
        border: 1px solid #2a323d;
        background: #1a2028;
        color: #f3f4f6;
        letter-spacing: 6px;
        text-align: center;
        font-size: 18px;
        outline: none;
        transition:
          border 0.2s,
          box-shadow 0.2s;
      }

      .code-input:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 18px;
      }

      .btn {
        flex: 1;
        padding: 14px;
        border-radius: var(--radius-sm);
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.1s ease,
          box-shadow 0.2s ease,
          background-color 0.2s ease;
      }

      .btn-primary {
        background: var(--accent-color);
        color: #fff;
      }

      .btn-primary:hover {
        background: #2563eb;
      }

      .btn-secondary {
        background: transparent;
        color: #f3f4f6;
        border: 1px solid #2a323d;
      }

      .btn-secondary:hover {
        background: #202732;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .status {
        margin-top: 14px;
        font-size: 13px;
        min-height: 18px;
        text-align: center;
      }

      .status.error {
        color: #ef4444;
      }

      .status.success {
        color: #22c55e;
      }

      .footer {
        margin-top: 22px;
        font-size: 13px;
        color: #b0b7c3;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .link {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 600;
      }

      .link:hover {
        text-decoration: underline;
      }

      /* =========================================
         MOBILE RESPONSIVE ADJUSTMENTS
         ========================================= */
      @media (max-width: 768px) {
        body {
          align-items: flex-start;
          padding: 20px 0;
          overflow-y: auto;
          min-height: 100dvh;
        }

        .login-container {
          flex-direction: column-reverse;
          width: 90% !important;
          max-width: 400px;
          min-height: auto;
          border-radius: 24px;
          margin: 0 auto;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .left-section {
          padding: 30px 24px;
          background: #000000;
          border-radius: 0 0 24px 24px;
        }

        .right-section {
          height: 120px;
          background: radial-gradient(circle at center, #1a1a1a 0%, #000000 80%);
          border-radius: 24px 24px 0 0;
          border-bottom: 1px solid #1a1a1a;
        }

        .character-container {
          width: 100%;
          height: 100%;
          transform: scale(0.4);
          transform-origin: center bottom;
          margin-bottom: -15px;
        }

        .heading {
          font-size: 22px;
          justify-content: center;
        }

        .muted {
          text-align: center;
          font-size: 13px;
        }

        .email-tag {
          justify-content: center;
          font-size: 14px;
          width: 100%;
        }

        /* Touch-friendly inputs */
        .code-input {
          padding: 14px;
          font-size: 18px;
          min-height: 48px;
        }

        .btn {
          padding: 16px;
          min-height: 48px;
          font-size: 16px;
        }

        .actions {
          flex-direction: column;
        }

        .footer {
          flex-direction: column;
          gap: 12px;
          text-align: center;
        }
      }

      /* Touch-friendly hover states */
      @media (hover: none) {
        .btn:active {
          transform: scale(0.98);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="left-section">
        <div class="heading"><i class="fas fa-shield-check"></i> Verify your email</div>
        <p class="muted" id="introText">
          We sent a 6-digit code to your email. Enter it below to continue.
        </p>
        <div class="email-tag" id="emailTag">
          <i class="fas fa-envelope"></i><span id="emailValue">example@email.com</span>
        </div>

        <label class="field-label" for="codeInput">Verification code</label>
        <input
          id="codeInput"
          class="code-input"
          type="text"
          maxlength="6"
          autocomplete="one-time-code"
          placeholder="000000"
        />

        <div class="actions">
          <button id="verifyBtn" class="btn btn-primary">Confirm</button>
          <button id="resendBtn" class="btn btn-secondary">Resend code</button>
        </div>

        <div class="status" id="statusMessage"></div>

        <div class="footer">
          <span id="lastMessage"></span>
          <a class="link" href="login.html">Back to login</a>
        </div>
      </div>

      <div class="right-section">
        <div class="character-container">
          <div class="bot-rig" id="botRig">
            <div class="antenna-stalk"></div>
            <div class="antenna-bulb"></div>
            <div class="head">
              <div class="face-screen">
                <div class="loader"></div>
                <div class="eyes-container">
                  <div class="eye left">
                    <div class="eyelid top"></div>
                    <div class="pupil"></div>
                    <div class="eyelid bottom"></div>
                  </div>
                  <div class="eye right">
                    <div class="eyelid top"></div>
                    <div class="pupil"></div>
                    <div class="eyelid bottom"></div>
                  </div>
                </div>
                <div class="mouth"></div>
              </div>
            </div>
            <div class="hands-container">
              <div class="hand left"></div>
              <div class="hand right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/config.js"></script>
    <script type="module">
      import { Network } from '../js/app/network.js';
      import { Auth } from '../js/features/auth/auth.js';
      import { SynchroBot } from '../js/features/auth/synchro/SynchroBot.js';
      import { SynchroRenderer } from '../js/features/auth/synchro/SynchroRenderer.js';

      // Initialize SynchroBot with verify flow (expectant state)
      const container = document.querySelector('.character-container');
      let synchro = null;
      let renderer = null;

      if (container) {
        synchro = new SynchroBot({ authFlow: 'verify' });
        synchro.init('.character-container');

        renderer = new SynchroRenderer(container);
        renderer.injectParticleCSS();
      }

      const params = new URLSearchParams(window.location.search);
      const storedEmail = sessionStorage.getItem('verificationEmail');
      const email = storedEmail || params.get('email');
      const storedUsername = sessionStorage.getItem('verificationUsername');
      const verificationMessage =
        sessionStorage.getItem('verificationMessage') || 'Use the code we just sent to continue.';
      const docId = sessionStorage.getItem('postLoginDocId');

      const emailValueEl = document.getElementById('emailValue');
      const introTextEl = document.getElementById('introText');
      const codeInput = document.getElementById('codeInput');
      const verifyBtn = document.getElementById('verifyBtn');
      const resendBtn = document.getElementById('resendBtn');
      const statusMessage = document.getElementById('statusMessage');
      const lastMessage = document.getElementById('lastMessage');

      if (!email) {
        window.location.href = 'login.html';
      } else {
        emailValueEl.textContent = email;
        introTextEl.textContent = `We sent a 6-digit code to ${email}. Open your inbox and paste it below.`;
        lastMessage.textContent = verificationMessage;

        // Check if we just sent a code from the login page
        const codeJustSent = sessionStorage.getItem('codeJustSent');
        if (codeJustSent === 'true') {
          sessionStorage.removeItem('codeJustSent');
          setStatus('Code sent. Check your email.', 'success');
        } else {
          // Send a fresh code on arrival to this page
          sendCode();
        }
      }

      function setStatus(text, type = '') {
        statusMessage.textContent = text;
        statusMessage.className = 'status ' + type;
        if (type === 'error') {
          synchro?.onError();
        }
      }

      // Wire up SynchroBot events for code input
      codeInput?.addEventListener('focus', () => {
        synchro?.onFieldFocus('code', codeInput.value);
      });

      codeInput?.addEventListener('input', () => {
        const isComplete = codeInput.value.length === 6;
        synchro?.onFieldInput('code', codeInput.value, {
          formData: {
            code: codeInput.value,
            _hasErrors: false,
          },
        });
        // Show ready state when code is complete
        if (isComplete) {
          synchro?.transition('hover-ready');
        }
      });

      codeInput?.addEventListener('blur', () => {
        synchro?.onFieldBlur();
      });

      // Button hover events
      verifyBtn?.addEventListener('mouseenter', () => {
        synchro?.onButtonHover(true);
      });

      verifyBtn?.addEventListener('mouseleave', () => {
        synchro?.onButtonHover(false);
      });

      resendBtn?.addEventListener('click', () => {
        sendCode();
      });

      async function sendCode() {
        setStatus('Sending code...', '');
        synchro?.onSubmit();
        try {
          await Network.fetchAPI('/api/auth/resend-code', {
            method: 'POST',
            body: JSON.stringify({ email }),
          });
          synchro?.transition('idle');
          setStatus('Code sent. Check your email.', 'success');
          codeInput.value = '';
          codeInput.focus();
        } catch (err) {
          console.error('Resend error:', err);
          synchro?.onError();
          setStatus(
            err.message.replace('API error: ', 'Error ') || 'Unable to send code. Try again.',
            'error'
          );
        }
      }

      async function verifyCode() {
        const code = codeInput.value.trim();
        if (!code || code.length < 6) {
          setStatus('Enter the 6-digit code.', 'error');
          codeInput.focus();
          return;
        }

        synchro?.onSubmit();
        setStatus('Verifying...', '');
        try {
          const data = await Network.fetchAPI('/api/auth/verify-email', {
            method: 'POST',
            body: JSON.stringify({ email, verificationCode: code }),
          });

          synchro?.onSuccess();
          renderer?.burst('star', 5);
          setStatus('Email verified! Redirecting...', 'success');
          if (data.token) {
            Auth.setToken(data.token);
          }
          if (data.username || storedUsername) {
            localStorage.setItem('synchroEditUser', data.username || storedUsername);
          }
          sessionStorage.removeItem('verificationEmail');
          sessionStorage.removeItem('verificationUsername');
          sessionStorage.removeItem('verificationMessage');
          const redirectUrl = docId ? `../index.html?doc=${docId}` : '../index.html';
          sessionStorage.removeItem('postLoginDocId');
          setTimeout(() => (window.location.href = redirectUrl), 1200);
        } catch (err) {
          console.error('Verification error:', err);
          synchro?.onError();
          setStatus(
            err.message.replace('API error: ', 'Error ') || 'Invalid code. Try again.',
            'error'
          );
        }
      }

      verifyBtn.addEventListener('click', verifyCode);
      codeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyCode();
      });
      codeInput.focus();
    </script>
  </body>
</html>
