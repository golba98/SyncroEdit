<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting SynchroEdit...</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #101418;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #f3f4f6;
      }

      .container {
        text-align: center;
        max-width: 600px;
        padding: 40px;
      }

      h1 {
        font-size: 48px;
        margin-bottom: 20px;
        animation: fadeIn 1s ease-in;
        color: #3b82f6;
      }

      .logo {
        font-size: 72px;
        margin-bottom: 30px;
        animation: bounce 2s infinite;
      }

      p {
        font-size: 18px;
        margin-bottom: 30px;
        opacity: 0.9;
        color: #b0b7c3;
      }

      .loading {
        display: inline-block;
        width: 50px;
        height: 50px;
        border: 5px solid rgba(59, 130, 246, 0.15);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
    </style>
    <script src="/config.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="logo">📄</div>
      <h1>SynchroEdit</h1>
      <p>Starting your collaborative document editor...</p>
      <div class="loading"></div>
    </div>

    <script>
      // Redirect to login page after brief delay
      setTimeout(() => {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          window.location.href = 'login.html?autologin=true';
        } else {
          window.location.href = 'login.html';
        }
      }, 2000);
    </script>
  </body>
</html>
