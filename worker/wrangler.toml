name = "syncroedit-api"
main = "src/index.js"
compatibility_date = "2026-06-08"

[vars]
APP_NAME = "SyncroEdit"
ENVIRONMENT = "development"
API_VERSION = "v1"
BACKEND_ORIGIN = "http://localhost:3000"
REALTIME_DURABLE_OBJECTS_ENABLED = "false"
EDGE_RATE_LIMITING_ENABLED = "false"

[[durable_objects.bindings]]
name = "DOCUMENT_SYNC_OBJECT"
class_name = "DocumentSyncObject"

[[migrations]]
tag = "v1_document_sync_object"
new_sqlite_classes = [ "DocumentSyncObject" ]
