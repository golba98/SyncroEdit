name = "synchroedit"
main = "src-worker/index.js"
compatibility_date = "2024-04-03"
compatibility_flags = [ "nodejs_compat" ]

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "synchroedit-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "DOCUMENT_SYNC_OBJECT"
class_name = "DocumentSyncObject"

[[migrations]]
tag = "v1"
new_classes = ["DocumentSyncObject"]
