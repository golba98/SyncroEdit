name = "synchroedit"
main = "src-worker/index.js"
compatibility_date = "2026-06-10"

# Only keep this if the Worker code truly imports Node APIs.
# If the rebuild uses Web Crypto/Hono only, remove it.
# compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*", "/health"]

[[d1_databases]]
binding = "DB"
database_name = "synchroedit-db"
database_id = "22d0142f-5997-4622-bd2d-33eab48beeea"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "DOCUMENT_SYNC_OBJECT"
class_name = "DocumentSyncObject"

[[durable_objects.bindings]]
name = "RATE_LIMIT_OBJECT"
class_name = "RateLimitObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DocumentSyncObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimitObject"]
